# Configuracion del SensorDataAdapter - Quarkus Application

# Configuracion del Servidor TCP
# Puerto en el que escucha el Adapter para recibir paquetes del TcpSensorServer
tcp.server.port=9090
tcp.server.host=0.0.0.0

# Configuracion de Buffer
# Tamano del buffer para recibir paquetes binarios (en bytes)
tcp.buffer.size=8192

# Configuracion HTTP de Quarkus (para health checks y metricas)
quarkus.http.port=8081

# Deshabilitar banner de inicio
quarkus.banner.enabled=false

# Configuracion de logging - minima
quarkus.log.level=ERROR
quarkus.log.console.enable=false
