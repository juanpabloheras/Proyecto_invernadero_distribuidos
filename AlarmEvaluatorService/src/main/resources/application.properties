# ============================================================
# Servidor HTTP de la app (health, dev console, metrics)
# ============================================================
quarkus.http.port=8080

# ============================================================
# gRPC SERVIDOR \u00e2\u0080\u0094 el evaluador escucha aqui
# Lo usa el CRUD para llamar NotificarConfiguracionCreada
# ============================================================
quarkus.grpc.server.use-separate-server=true
quarkus.grpc.server.host=0.0.0.0
quarkus.grpc.server.port=50051

# ============================================================
# gRPC CLIENTE \u00e2\u0080\u0094 el evaluador llama al CRUD Node
# RPC: ObtenerConfiguracionesActivas
# El nombre "crud-invernadero" se inyecta luego con @GrpcClient
# ============================================================
quarkus.grpc.clients.crud-invernadero.host=${CRUD_GRPC_HOST:localhost}
quarkus.grpc.clients.crud-invernadero.port=${CRUD_GRPC_PORT:50052}
quarkus.grpc.clients.crud-invernadero.plain-text=true

# ============================================================
# RabbitMQ
# ============================================================
quarkus.rabbitmq.devservices.enabled=false

rabbitmq-host=${RABBITMQ_HOST:localhost}
rabbitmq-port=${RABBITMQ_PORT:5672}
rabbitmq-username=${RABBITMQ_USERNAME:guest}
rabbitmq-password=${RABBITMQ_PASSWORD:guest}

# ============================================================
# Consumer: lecturas de sensores
# Escucha eventos publicados por el servicio de sensores
# ============================================================
mp.messaging.incoming.sensor-readings.connector=smallrye-rabbitmq
mp.messaging.incoming.sensor-readings.exchange.name=invernadero.events
mp.messaging.incoming.sensor-readings.exchange.type=topic
mp.messaging.incoming.sensor-readings.exchange.durable=true
mp.messaging.incoming.sensor-readings.exchange.auto-delete=false
mp.messaging.incoming.sensor-readings.queue.name=alarm-evaluator.sensor-readings
mp.messaging.incoming.sensor-readings.queue.durable=true
mp.messaging.incoming.sensor-readings.routing-keys=sensor.lectura.registrada
mp.messaging.incoming.sensor-readings.auto-acknowledgement=true

# ============================================================
# Publisher: alarmas
# Publica alarmas con routing key alarma.disparada
# ============================================================
mp.messaging.outgoing.alarmas-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.alarmas-out.exchange.name=invernadero.events
mp.messaging.outgoing.alarmas-out.exchange.type=topic
mp.messaging.outgoing.alarmas-out.exchange.durable=true
mp.messaging.outgoing.alarmas-out.default-routing-key=alarma.disparada