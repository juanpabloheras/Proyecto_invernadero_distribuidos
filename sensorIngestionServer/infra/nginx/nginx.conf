# nginx.conf — Load Balancer Layer 4 (TCP) para SensorIngestionServer
# Modo: stream (NO http). Los sensores hablan binario crudo sobre TCP.

events {
    worker_connections 1024;
}

stream {
    # Formato de log para conexiones TCP
    log_format basic '$remote_addr [$time_local] '
                     '$protocol $status $bytes_sent $bytes_received '
                     '$session_time "$upstream_addr"';

    access_log /var/log/nginx/tcp-access.log basic;
    error_log  /var/log/nginx/tcp-error.log;

    # Pool de backends: instancias del SensorDataAdapter
    upstream sensor_adapters {
        # least_conn: nueva conexión al backend con menos conexiones activas.
        # Preferible sobre round_robin cuando las conexiones TCP son persistentes
        # y de duración variable (sensores que mantienen la sesión abierta).
        least_conn;

        # max_fails=3      → 3 errores consecutivos marcan el backend como down
        # fail_timeout=30s → tiempo fuera del pool antes de reintentar
        server sensor-adapter-1:9090 max_fails=3 fail_timeout=30s;
        server sensor-adapter-2:9090 max_fails=3 fail_timeout=30s;

        # Para escalar horizontalmente, agregar líneas aquí y un nuevo servicio
        # en docker-compose.yml:
        # server sensor-adapter-3:9090 max_fails=3 fail_timeout=30s;
    }

    # Único endpoint TCP visible para los sensores físicos
    server {
        listen 9090;
        proxy_pass sensor_adapters;

        # Ajustado para sesiones largas de sensores
        proxy_connect_timeout 5s;
        proxy_timeout        1h;

        # Si el backend elegido falla al conectar, reintenta con otro
        proxy_next_upstream     on;
        proxy_next_upstream_tries 2;
    }
}
