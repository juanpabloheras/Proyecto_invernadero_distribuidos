# docker-compose.yml — SensorIngestionServer con Load Balancer TCP (NGINX)
#
# Arquitectura:
#   [Sensores] → nginx-lb:9090 → sensor-adapter-1:9090
#                              → sensor-adapter-2:9090 → [RabbitMQ externo]
#
# RabbitMQ corre en un contenedor separado (otro stack).
# Apunta RABBITMQ_HOST al hostname/IP del contenedor RabbitMQ.
#
# Uso:
#   cp .env.example .env          # configurar RABBITMQ_HOST
#   docker compose up -d --build
#
# Ver logs:
#   docker compose logs -f nginx-lb
#   docker compose logs -f sensor-adapter-1

services:

  # ── Load Balancer TCP Layer 4 ──────────────────────────────────────────────
  nginx-lb:
    image: nginx:alpine
    container_name: invernadero-nginx-lb
    ports:
      - "9090:9090"     # único puerto expuesto al exterior — el que ven los sensores
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sensor-adapter-1
      - sensor-adapter-2
    networks:
      - invernadero-net
    restart: unless-stopped

  # ── Instancia 1 del SensorDataAdapter ─────────────────────────────────────
  sensor-adapter-1:
    build:
      context: ../                        # sensorIngestionServer/ (contiene pom.xml + SensorDataAdapter/)
      dockerfile: SensorDataAdapter/Dockerfile
    container_name: invernadero-sensor-adapter-1
    environment:
      - RABBITMQ_HOST=${RABBITMQ_HOST:-localhost}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - INSTANCE_ID=adapter-1
    expose:
      - "9090"          # solo visible dentro de la red Docker, NO al host
    networks:
      - invernadero-net
    restart: unless-stopped

  # ── Instancia 2 del SensorDataAdapter ─────────────────────────────────────
  sensor-adapter-2:
    build:
      context: ../
      dockerfile: SensorDataAdapter/Dockerfile
    container_name: invernadero-sensor-adapter-2
    environment:
      - RABBITMQ_HOST=${RABBITMQ_HOST:-localhost}
      - RABBITMQ_PORT=${RABBITMQ_PORT:-5672}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - INSTANCE_ID=adapter-2
    expose:
      - "9090"
    networks:
      - invernadero-net
    restart: unless-stopped

networks:
  invernadero-net:
    driver: bridge
