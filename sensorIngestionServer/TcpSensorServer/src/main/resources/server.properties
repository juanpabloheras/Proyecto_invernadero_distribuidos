# Configuracion del Servidor TCP
# Puerto en el que escucha el servidor TCP
server.port=8080

# Configuracion del Pool de Hilos
# Numero de hilos en el pool para manejar conexiones concurrentes
server.threadpool.size=10

# Numero maximo de clientes simultaneos
server.max.clients=100

# Configuracion de Buffer
# Tamano del buffer para mensajes binarios (en bytes)
server.buffer.size=8192

# Timeout de conexion (en milisegundos)
server.connection.timeout=30000

# Configuracion del Sensor Adapter
# Puerto del Sensor Adapter para reenviar paquetes
sensoradapter.host=localhost
sensoradapter.port=9090

# Configuracion de Logging
server.logging.enabled=true
