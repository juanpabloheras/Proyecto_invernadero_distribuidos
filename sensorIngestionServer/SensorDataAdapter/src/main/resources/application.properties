# Configuracion del SensorDataAdapter - Quarkus Application

# Configuracion del Servidor TCP
tcp.server.port=9090
tcp.server.host=0.0.0.0

# Configuracion de Buffer
tcp.buffer.size=8192

# Configuracion HTTP de Quarkus
quarkus.http.port=8081

# Deshabilitar banner de inicio
quarkus.banner.enabled=false

# Logging
quarkus.log.level=INFO
quarkus.log.console.enable=true

# RabbitMQ
rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=guest
rabbitmq-password=guest
rabbitmq-virtualhost=/

# Canal saliente hacia RabbitMQ
mp.messaging.outgoing.sensor-events.connector=smallrye-rabbitmq
mp.messaging.outgoing.sensor-events.exchange.name=invernadero.events
mp.messaging.outgoing.sensor-events.exchange.type=topic
mp.messaging.outgoing.sensor-events.exchange.durable=true
mp.messaging.outgoing.sensor-events.exchange.auto-delete=false
mp.messaging.outgoing.sensor-events.default-routing-key=sensor.lectura.registrada
mp.messaging.outgoing.sensor-events.content-type=application/json

# Estrategia de back-pressure: buffer de 256 mensajes antes de lanzar excepcion.
# Si RabbitMQ se ralentiza y el buffer se llena, publicar() captura la excepcion y la registra.
mp.messaging.outgoing.sensor-events.overflow-buffer-size=256