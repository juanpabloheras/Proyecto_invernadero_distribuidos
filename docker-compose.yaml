services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_invernadero
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  mysql:
    image: mysql:8.0
    container_name: mysql_invernadero
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: invernadero_db
      MYSQL_USER: invernadero_user
      MYSQL_PASSWORD: invernadero_pass
    volumes:
      - mysql_data:/var/lib/mysql

  mongo:
    image: mongo:7
    container_name: mongo_invernadero
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  nginx-sensor-lb:
    image: nginx:alpine
    container_name: nginx_sensor_lb
    ports:
      - "9090:9090"
    volumes:
      - ./sensorIngestionServer/infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sensor-adapter-1
      - sensor-adapter-2
    restart: unless-stopped

  sensor-adapter-1:
    build:
      context: ./sensorIngestionServer
      dockerfile: Dockerfile
    container_name: sensor_adapter_1
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      INSTANCE_ID: adapter-1
    expose:
      - "9090"
      - "8081"
    depends_on:
      - rabbitmq
    restart: unless-stopped

  sensor-adapter-2:
    build:
      context: ./sensorIngestionServer
      dockerfile: Dockerfile
    container_name: sensor_adapter_2
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      INSTANCE_ID: adapter-2
    expose:
      - "9090"
      - "8081"
    depends_on:
      - rabbitmq
    restart: unless-stopped
  
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: backend_invernadero
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_NAME: invernadero_db
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: mysql
      DB_PORT: 3306
      ALARMA_GRPC_URL: alarm-evaluator-1:50051
      ALARMA_GRPC_TIMEOUT_MS: 3000
    depends_on:
      - mysql
    restart: unless-stopped

  alarm-evaluator-1:
    build:
      context: ./AlarmEvaluatorService
      dockerfile: Dockerfile
    container_name: alarm_evaluator_1
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      CRUD_GRPC_HOST: backend
      CRUD_GRPC_PORT: 50052
      INSTANCE_ID: evaluator-1
    expose:
      - "8080"
      - "50051"
    depends_on:
      - rabbitmq
      - backend
    restart: unless-stopped

  alarm-evaluator-2:
    build:
      context: ./AlarmEvaluatorService
      dockerfile: Dockerfile
    container_name: alarm_evaluator_2
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      CRUD_GRPC_HOST: backend
      CRUD_GRPC_PORT: 50052
      INSTANCE_ID: evaluator-2
    expose:
      - "8080"
      - "50051"
    depends_on:
      - rabbitmq
      - backend
    restart: unless-stopped

  historical-data-1:
    build:
      context: ./HistoricalDataService
      dockerfile: Dockerfile
    container_name: historical_data_1
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DATABASE: invernadero_historico
      INSTANCE_ID: historical-1
    depends_on:
      - rabbitmq
      - mongo
    restart: unless-stopped

  historical-data-2:
    build:
      context: ./HistoricalDataService
      dockerfile: Dockerfile
    container_name: historical_data_2
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DATABASE: invernadero_historico
      INSTANCE_ID: historical-2
    depends_on:
      - rabbitmq
      - mongo
    restart: unless-stopped


  notificador-alarmas:
    build:
      context: ./NotificadorAlarmas
      dockerfile: Dockerfile
    container_name: notificador_alarmas
    ports:
      - "8083:8083"
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    depends_on:
      - rabbitmq
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend/invernadero_front
      dockerfile: Dockerfile
    container_name: frontend_invernadero
    ports:
      - "5173:80"
    depends_on:
      - backend
      - notificador-alarmas
    restart: unless-stopped
volumes:
  rabbitmq_data:
  mysql_data:
  mongo_data: