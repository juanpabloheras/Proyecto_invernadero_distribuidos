services:

  # =========================================================
  # RABBITMQ
  # =========================================================

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_invernadero

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    restart: unless-stopped

  # =========================================================
  # MYSQL
  # =========================================================

  mysql:
    image: mysql:8.0
    container_name: mysql_invernadero

    ports:
      - "3308:3306"

    environment:
      MYSQL_ROOT_PASSWORD: root

      MYSQL_DATABASE: invernadero_db

      MYSQL_USER: invernadero_user
      MYSQL_PASSWORD: invernadero_pass

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

    restart: unless-stopped

  # =========================================================
  # MONGO
  # =========================================================

  mongo:
    image: mongo:7
    container_name: mongo_invernadero

    ports:
      - "27018:27017"

    volumes:
      - mongo_data:/data/db

    restart: unless-stopped

  # =========================================================
  # SENSOR LOAD BALANCER
  # =========================================================

  nginx-sensor-lb:
    image: nginx:alpine
    container_name: nginx_sensor_lb

    ports:
      - "9090:9090"

    volumes:
      - ./sensorIngestionServer/infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - sensor-adapter-1
      - sensor-adapter-2

    restart: unless-stopped

  # =========================================================
  # SENSOR ADAPTER 1
  # =========================================================

  sensor-adapter-1:
    build:
      context: ./sensorIngestionServer
      dockerfile: Dockerfile

    container_name: sensor_adapter_1

    environment:
      HTTP_PORT: 8081

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

      INSTANCE_ID: adapter-1

    expose:
      - "9090"
      - "8081"

    depends_on:
      - rabbitmq

    restart: unless-stopped

  # =========================================================
  # SENSOR ADAPTER 2
  # =========================================================

  sensor-adapter-2:
    build:
      context: ./sensorIngestionServer
      dockerfile: Dockerfile

    container_name: sensor_adapter_2

    environment:
      HTTP_PORT: 8081

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

      INSTANCE_ID: adapter-2

    expose:
      - "9090"
      - "8081"

    depends_on:
      - rabbitmq

    restart: unless-stopped

  # =========================================================
  # BACKEND NODE.JS
  # =========================================================

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile

    container_name: backend_invernadero

    ports:
      - "3000:3000"
      - "50052:50052"

    environment:
      PORT: 3000

      DB_HOST: mysql
      DB_PORT: 3306

      DB_NAME: invernadero_db
      DB_USER: root
      DB_PASSWORD: root

      ALARMA_GRPC_HOST: alarm-evaluator-1
      ALARMA_GRPC_PORT: 50051
      ALARMA_GRPC_TIMEOUT_MS: 3000

    depends_on:
      mysql:
        condition: service_healthy

    restart: unless-stopped

  # =========================================================
  # ALARM EVALUATOR 1
  # =========================================================

  alarm-evaluator-1:
    build:
      context: ./AlarmEvaluatorService
      dockerfile: Dockerfile

    container_name: alarm_evaluator_1

    environment:
      HTTP_PORT: 8080

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

      CRUD_GRPC_HOST: backend
      CRUD_GRPC_PORT: 50052

      INSTANCE_ID: evaluator-1

    expose:
      - "8080"
      - "50051"

    depends_on:
      - rabbitmq
      - backend

    restart: unless-stopped

  # =========================================================
  # ALARM EVALUATOR 2
  # =========================================================

  alarm-evaluator-2:
    build:
      context: ./AlarmEvaluatorService
      dockerfile: Dockerfile

    container_name: alarm_evaluator_2

    environment:
      HTTP_PORT: 8080

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

      CRUD_GRPC_HOST: backend
      CRUD_GRPC_PORT: 50052

      INSTANCE_ID: evaluator-2

    expose:
      - "8080"
      - "50051"

    depends_on:
      - rabbitmq
      - backend

    restart: unless-stopped

  # =========================================================
  # HISTORICAL DATA 1
  # =========================================================

  historical-data-1:
    build:
      context: ./HistoricalDataService
      dockerfile: Dockerfile

    container_name: historical_data_1

    ports:
      - "8085:8085"

    environment:
      HTTP_PORT: 8085

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

      MONGO_URI: mongodb://mongo:27017
      MONGO_DATABASE: invernadero_historico

      CORS_ORIGINS: http://localhost:5173

      INSTANCE_ID: historical-1

    depends_on:
      - rabbitmq
      - mongo

    restart: unless-stopped

  # =========================================================
  # HISTORICAL DATA 2
  # =========================================================

  historical-data-2:
    build:
      context: ./HistoricalDataService
      dockerfile: Dockerfile

    container_name: historical_data_2

    expose:
      - "8085"

    environment:
      HTTP_PORT: 8085

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

      MONGO_URI: mongodb://mongo:27017
      MONGO_DATABASE: invernadero_historico

      CORS_ORIGINS: http://localhost:5173

      INSTANCE_ID: historical-2

    depends_on:
      - rabbitmq
      - mongo

    restart: unless-stopped

  # =========================================================
  # NOTIFICADOR SSE
  # =========================================================

  notificador-alarmas:
    build:
      context: ./NotificadorAlarmas
      dockerfile: Dockerfile

    container_name: notificador_alarmas

    ports:
      - "8083:8083"

    environment:
      HTTP_PORT: 8083

      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

      CORS_ORIGINS: http://localhost:5173

    depends_on:
      - rabbitmq

    restart: unless-stopped

  # =========================================================
  # FRONTEND
  # =========================================================

  frontend:
    build:
      context: ./Frontend/invernadero_front
      dockerfile: Dockerfile

      args:
        VITE_API_URL: http://localhost:3000
        VITE_SSE_URL: http://localhost:8083
        VITE_ANALITICA_URL: http://localhost:8085
        VITE_HISTORICAL_URL: http://localhost:8085
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-AIzaSyCiG1qnC3VLgv5X7rzVV_UJ0sawCoOPv8o}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-invernadreo-distribuidos.firebaseapp.com}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-invernadreo-distribuidos}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-1:287803596484:web:4a920387099ce402893391}

    container_name: frontend_invernadero

    ports:
      - "5173:80"

    depends_on:
      - backend
      - notificador-alarmas
      - historical-data-1

    restart: unless-stopped

# =========================================================
# VOLUMES
# =========================================================

volumes:
  rabbitmq_data:
  mysql_data:
  mongo_data:
