# ============================================================
# HTTP
# ============================================================

quarkus.http.port=${HTTP_PORT:8082}

quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with

# ============================================================
# RabbitMQ
# ============================================================

quarkus.rabbitmq.devservices.enabled=false

rabbitmq-host=${RABBITMQ_HOST:rabbitmq}
rabbitmq-port=${RABBITMQ_PORT:5672}
rabbitmq-username=${RABBITMQ_USERNAME:guest}
rabbitmq-password=${RABBITMQ_PASSWORD:guest}

# ============================================================
# Consumer: alarmas disparadas
# ============================================================

mp.messaging.incoming.alarmas-in.connector=smallrye-rabbitmq
mp.messaging.incoming.alarmas-in.exchange.name=invernadero.events
mp.messaging.incoming.alarmas-in.exchange.type=topic
mp.messaging.incoming.alarmas-in.exchange.durable=true
mp.messaging.incoming.alarmas-in.exchange.auto-delete=false
mp.messaging.incoming.alarmas-in.queue.name=notificador.alarmas
mp.messaging.incoming.alarmas-in.queue.durable=true
mp.messaging.incoming.alarmas-in.routing-keys=alarma.disparada
mp.messaging.incoming.alarmas-in.auto-acknowledgement=true